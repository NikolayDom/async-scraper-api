name: Test

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install httpx sqlalchemy psycopg2-binary python-dotenv fastapi uvicorn

      - name: Check Python syntax
        run: python -m py_compile app.py test_httpx2.py